<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Test Form</title>
</head>
<body>
    <form>
        <div class="form-row">
            <label for="ceb_eleve_prenom">Prénom</label>
            <input type="text" id="ceb_eleve_prenom" name="ceb_eleve_prenom">
        </div>
        <div class="form-row">
            <label for="ceb_eleve_nom">Nom</label>
            <input type="text" id="ceb_eleve_nom" name="ceb_eleve_nom">
        </div>

        <div class="form-row">
            <label><input type="radio" name="ceb_motivation_type" value="fichier" checked> Joindre un fichier</label>
            <label><input type="radio" name="ceb_motivation_type" value="texte"> Rédiger ici</label>
        </div>

        <div class="form-row" id="ceb_motivation_fichier_wrap">
            <label for="ceb_motivation_fichier">Fichier</label>
            <input type="file" id="ceb_motivation_fichier" name="ceb_motivation_fichier" required>
        </div>

        <div class="form-row" id="ceb_motivation_texte_wrap" style="display:none;">
            <label for="ceb_motivation_texte">Texte</label>
            <textarea id="ceb_motivation_texte" name="ceb_motivation_texte"></textarea>
        </div>
    </form>
    <script src="assets/js/public-application-form.js"></script>
</body>
</html>
